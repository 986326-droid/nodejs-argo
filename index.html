<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>星際流光 · Unique Landing Page</title>

<style>
:root{
    --bg:#050816;
    --primary:#7c5cff;
    --secondary:#00d4ff;
    --text:#f5f7ff;
    --glass:rgba(255,255,255,0.08);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Segoe UI","Noto Sans TC",sans-serif;
}

body{
    min-height:100vh;
    background:
        radial-gradient(circle at 20% 20%, rgba(124,92,255,.35), transparent 35%),
        radial-gradient(circle at 80% 30%, rgba(0,212,255,.25), transparent 30%),
        radial-gradient(circle at 50% 80%, rgba(255,0,128,.15), transparent 30%),
        var(--bg);
    color:var(--text);
    overflow-x:hidden;
}

.stars{
    position:fixed;
    inset:0;
    pointer-events:none;
}

.star{
    position:absolute;
    width:2px;
    height:2px;
    background:white;
    border-radius:50%;
    animation:twinkle 4s infinite;
}

@keyframes twinkle{
    0%,100%{opacity:.2}
    50%{opacity:1}
}

header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:25px 8%;
}

.logo{
    font-size:1.5rem;
    font-weight:800;
    letter-spacing:2px;
}

nav a{
    color:white;
    text-decoration:none;
    margin-left:24px;
    opacity:.8;
}

.hero{
    min-height:85vh;
    display:grid;
    grid-template-columns:1fr 1fr;
    align-items:center;
    padding:0 8%;
    gap:40px;
}

.hero-text h1{
    font-size:clamp(3rem,6vw,6rem);
    line-height:1;
    margin-bottom:20px;
}

.gradient{
    background:linear-gradient(90deg,var(--secondary),var(--primary));
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.hero-text p{
    font-size:1.15rem;
    opacity:.85;
    max-width:600px;
    line-height:1.8;
}

.btn{
    margin-top:30px;
    display:inline-block;
    padding:14px 30px;
    border-radius:999px;
    background:linear-gradient(90deg,var(--primary),var(--secondary));
    color:white;
    text-decoration:none;
    font-weight:bold;
    box-shadow:0 10px 30px rgba(124,92,255,.4);
}

.orb{
    width:420px;
    height:420px;
    margin:auto;
    border-radius:50%;
    background:
        radial-gradient(circle at 30% 30%, white, transparent 20%),
        linear-gradient(135deg,var(--primary),var(--secondary));
    filter:blur(0px);
    animation:float 6s ease-in-out infinite;
    box-shadow:
        0 0 100px rgba(124,92,255,.5),
        0 0 180px rgba(0,212,255,.25);
}

@keyframes float{
    50%{
        transform:translateY(-25px) rotate(8deg);
    }
}

.cards{
    padding:60px 8%;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:24px;
}

.card{
    background:var(--glass);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,.1);
    padding:30px;
    border-radius:24px;
    transition:.35s;
}

.card:hover{
    transform:translateY(-10px);
}

.card h3{
    margin-bottom:12px;
}

footer{
    text-align:center;
    padding:60px 20px;
    opacity:.6;
}

@media(max-width:900px){
    .hero{
        grid-template-columns:1fr;
        text-align:center;
        padding-top:40px;
    }

    .orb{
        width:280px;
        height:280px;
    }
}
</style>
</head>

<body>

<div class="stars" id="stars"></div>

<header>
    <div class="logo">✦ STARFLOW</div>
    <nav>
        <a href="#">首頁</a>
        <a href="#">探索</a>
        <a href="#">作品</a>
        <a href="#">聯絡</a>
    </nav>
</header>

<section class="hero">
    <div class="hero-text">
        <h1>
            穿越數位宇宙<br>
            <span class="gradient">創造你的光芒</span>
        </h1>

        <p>
            一個融合未來感、玻璃擬態與流光漸層的單頁網站。
            純 HTML、CSS、JavaScript 製作，不依賴任何框架，
            適合作為個人品牌、作品集或產品展示頁。
        </p>

        <a href="#" class="btn">立即探索</a>
    </div>

    <div class="orb"></div>
</section>

<section class="cards">
    <div class="card">
        <h3>🚀 超輕量</h3>
        <p>單一 HTML 檔即可部署到任何靜態主機。</p>
    </div>

    <div class="card">
        <h3>✨ 未來感設計</h3>
        <p>流光漸層、玻璃擬態與宇宙背景。</p>
    </div>

    <div class="card">
        <h3>⚡ 高效能</h3>
        <p>無框架依賴，載入快速且易於修改。</p>
    </div>
</section>

<footer>
    Designed for a unique web experience ✦ 2026
</footer>

<script>
const stars = document.getElementById("stars");

for(let i=0;i<180;i++){
    const star=document.createElement("div");
    star.className="star";
    star.style.left=Math.random()*100+"%";
    star.style.top=Math.random()*100+"%";
    star.style.animationDelay=Math.random()*4+"s";
    star.style.opacity=Math.random();
    stars.appendChild(star);
}
</script>

</body>
</html>
